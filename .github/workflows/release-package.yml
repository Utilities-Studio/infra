name: Release Package

on:
  push:
    branches:
      - main
    paths:
      - 'packages/*/src/**'
      - 'packages/*/package.json'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sync-env
          - env-local
          - env-encrypt
          - vite-env
          - stripe-sync

permissions:
  contents: write

concurrency:
  group: release-package
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      packages: ${{ steps.changed.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: changed
        run: |
          if [ "${{ inputs.package }}" == "all" ]; then
            CHANGED='["sync-env","env-local","env-encrypt","vite-env","stripe-sync"]'
          elif [ -n "${{ inputs.package }}" ]; then
            CHANGED='["${{ inputs.package }}"]'
          else
            PARENT=$(git rev-parse HEAD~1 2>/dev/null || git hash-object -t tree /dev/null)
            CHANGED=$(git diff --name-only "$PARENT" HEAD -- packages/ | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "packages=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed packages: $CHANGED"

  release:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.packages) }}
      max-parallel: 1
      fail-fast: false

    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - name: Checkout latest
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Rebase latest
        run: git pull --rebase origin main

      - name: Bump patch version
        id: version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          CURRENT_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || node -p "require('./package.json').version")
          NEW_VERSION=$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); console.log(`v${major}.${minor}.${patch + 1}`)" "$CURRENT_VERSION")
          npm version "$NEW_VERSION" --no-git-tag-version
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          bun publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ matrix.package }}-${{ steps.version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG" HEAD
            git push origin "refs/tags/$TAG"
          fi
