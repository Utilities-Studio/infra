name: Release Package

on:
  push:
    branches:
      - main
    paths:
      - 'packages/*/src/**'
      - 'packages/*/package.json'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to release'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - sync-env
          - env-local
          - vite-env
          - stripe-sync

permissions:
  contents: write

concurrency:
  group: release-package
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changed.outputs.packages }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: changed
        run: |
          if [ "${{ inputs.package }}" == "all" ]; then
            CHANGED='["sync-env","env-local","vite-env","stripe-sync"]'
          elif [ -n "${{ inputs.package }}" ]; then
            CHANGED='["${{ inputs.package }}"]'
          else
            PARENT=$(git rev-parse HEAD~1 2>/dev/null || git hash-object -t tree /dev/null)
            CHANGED=$(git diff --name-only "$PARENT" HEAD -- packages/ | cut -d'/' -f2 | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi
          echo "packages=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed packages: $CHANGED"

  release:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: ${{ fromJSON(needs.detect.outputs.packages) }}
      max-parallel: 1
      fail-fast: false

    defaults:
      run:
        working-directory: packages/${{ matrix.package }}

    steps:
      - name: Checkout latest
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Bump patch version
        id: version
        run: |
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          bun publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ matrix.package }}-${{ steps.version.outputs.version }}"
          git push origin "${{ matrix.package }}-${{ steps.version.outputs.version }}"
