name: Cleanup Cloudflare Workers Previews

on:
  workflow_call: {}

permissions:
  pull-requests: write

jobs:
  cleanup:
    if: github.event.pull_request.number != '' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Update deploy comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cf-workers-preview -->';
            const pr = context.payload.pull_request.number;
            const merged = context.payload.pull_request.merged;
            const branch = context.payload.pull_request.head.ref;

            const body = [
              marker,
              `### ${merged ? 'Merged' : 'Closed'} \`${branch}\` -- ⚡ Cloudflare Workers`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Status** | ${merged ? '🟣 Merged' : '⚫ Closed'} -- preview expired |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }
