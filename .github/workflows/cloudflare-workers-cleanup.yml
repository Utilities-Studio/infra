name: Cleanup Cloudflare Workers Previews

on:
  workflow_call: {}

permissions:
  pull-requests: write

jobs:
  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Update deploy comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-workers-deploy -->';
            const pr = context.payload.pull_request.number;
            const merged = context.payload.pull_request.merged;

            const body = [
              marker,
              '### :gear: Cloudflare Workers',
              '',
              `Preview expired (PR ${merged ? 'merged' : 'closed'}). Worker versions auto-cleanup after 1000 versions.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }
