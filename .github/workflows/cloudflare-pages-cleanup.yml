name: Cleanup Cloudflare Pages Previews

on:
  workflow_call:
    inputs:
      project_name:
        description: 'Cloudflare Pages project name'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Delete preview deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PROJECT="${{ inputs.project_name }}"

          echo "Cleaning up preview deployments for PR #${PR_NUMBER}..."

          DEPLOYMENTS=$(curl -s \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}/deployments" \
            | jq -r ".result[] | select(.deployment_trigger.metadata.branch == \"pr-${PR_NUMBER}\") | .id")

          if [ -z "$DEPLOYMENTS" ]; then
            echo "No preview deployments found for pr-${PR_NUMBER}"
            exit 0
          fi

          COUNT=0
          for DEPLOYMENT_ID in $DEPLOYMENTS; do
            echo "Deleting deployment ${DEPLOYMENT_ID}..."
            RESULT=$(curl -s -X DELETE \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PROJECT}/deployments/${DEPLOYMENT_ID}?force=true")

            SUCCESS=$(echo "$RESULT" | jq -r '.success')
            if [ "$SUCCESS" = "true" ]; then
              echo "  Deleted ${DEPLOYMENT_ID}"
              COUNT=$((COUNT + 1))
            else
              echo "  Failed to delete ${DEPLOYMENT_ID}: $(echo "$RESULT" | jq -r '.errors[0].message // "unknown error"')"
            fi
          done

          echo "Cleaned up ${COUNT} preview deployment(s)"

      - name: Update deploy comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-pages-deploy -->';
            const pr = context.payload.pull_request.number;
            const merged = context.payload.pull_request.merged;

            const body = [
              marker,
              '### :cloud: Cloudflare Pages',
              '',
              `Preview cleaned up (PR ${merged ? 'merged' : 'closed'}).`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }
