name: Claude Code Review

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ── Step 0: Update PR title/description if vague ──────────────────
      - name: Update PR title and description
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: 'false'
          claude_args: |
            --model claude-haiku-4-5-20251001
            --max-turns 5
            --allowedTools "Bash(git log:*),Bash(git diff:*),Bash(gh pr edit:*)"
          prompt: |
            Check if PR #${{ github.event.pull_request.number }} has a good title and description.

            Run these commands to understand the changes:
            - git log --oneline origin/main..HEAD
            - git diff --stat origin/main...HEAD

            Current PR title: "${{ github.event.pull_request.title }}"

            If the title is vague (branch name, single word, placeholder like "WIP"/"TODO"/"fix"/"update", or doesn't describe what the code does), AND/OR the PR has no body or a very short body, update it:

            gh pr edit ${{ github.event.pull_request.number }} --title "new title here" --body "## Summary
            - what changed and why

            ## Changes
            - notable file/module changes"

            Rules:
            - Title: concise imperative mood, under 70 chars
            - Body: 3-6 bullets total, no fluff
            - Do NOT use em dashes, use -- instead
            - If title and description already look good, do nothing and say "looks good"
            - Do NOT overwrite a well-written description

      # ── Step 1: Clean up old review state ──────────────────────────────
      - name: Clean up old reviews
        id: cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- claude-review -->';
            const summaryMarker = '<!-- claude-review-summary -->';

            // Collect existing inline review comments
            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner, repo, pull_number: pr, per_page: 100 }
            );
            const claudeInline = reviewComments.filter(c => c.body?.includes(marker));

            const resolved = claudeInline.filter(c =>
              c.position === null || c.body?.includes('~RESOLVED~')
            );
            const unresolved = claudeInline.filter(c =>
              c.position !== null && !c.body?.includes('~RESOLVED~')
            );

            // Minimize all old inline comments (they'll be replaced by the new review)
            for (const comment of claudeInline) {
              try {
                await github.graphql(`
                  mutation($id: ID!) {
                    minimizeComment(input: {
                      subjectId: $id,
                      classifier: OUTDATED
                    }) { minimizedComment { isMinimized } }
                  }
                `, { id: comment.node_id });
              } catch (err) {
                console.log(`Could not minimize ${comment.id}: ${err.message}`);
              }
            }
            console.log(`Minimized ${claudeInline.length} old inline comments`);

            // Resolve review threads that contain our old comments.
            if (claudeInline.length > 0) {
              try {
                const claudeCommentIds = new Set(claudeInline.map(c => c.node_id));
                let hasNextPage = true;
                let cursor = null;
                const threadsToResolve = [];

                while (hasNextPage) {
                  const result = await github.graphql(`
                    query($owner: String!, $repo: String!, $pr: Int!, $cursor: String) {
                      repository(owner: $owner, name: $repo) {
                        pullRequest(number: $pr) {
                          reviewThreads(first: 100, after: $cursor) {
                            pageInfo { hasNextPage endCursor }
                            nodes {
                              id
                              isResolved
                              isOutdated
                              comments(first: 50) {
                                nodes { id isMinimized }
                              }
                            }
                          }
                        }
                      }
                    }
                  `, { owner, repo, pr, cursor });

                  const threads = result.repository.pullRequest.reviewThreads;
                  for (const thread of threads.nodes) {
                    if (thread.isResolved) continue;
                    const comments = thread.comments.nodes;
                    const hasClaudeComment = comments.some(c => claudeCommentIds.has(c.id));
                    const allHandled = comments.every(c =>
                      claudeCommentIds.has(c.id) || c.isMinimized
                    );
                    if (hasClaudeComment && allHandled) {
                      threadsToResolve.push(thread.id);
                    }
                  }

                  hasNextPage = threads.pageInfo.hasNextPage;
                  cursor = threads.pageInfo.endCursor;
                }

                for (const threadId of threadsToResolve) {
                  try {
                    await github.graphql(`
                      mutation($id: ID!) {
                        resolveReviewThread(input: { threadId: $id }) {
                          thread { isResolved }
                        }
                      }
                    `, { id: threadId });
                  } catch (err) {
                    console.log(`Could not resolve thread ${threadId}: ${err.message}`);
                  }
                }
                console.log(`Resolved ${threadsToResolve.length} review threads`);
              } catch (err) {
                console.log(`Could not query review threads: ${err.message}`);
              }
            }

            // Dismiss previous pending reviews from the bot
            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner, repo, pull_number: pr, per_page: 100 }
            );
            for (const review of reviews) {
              if (review.state === 'CHANGES_REQUESTED' && review.user?.type === 'Bot') {
                try {
                  await github.rest.pulls.dismissReview({
                    owner, repo, pull_number: pr, review_id: review.id,
                    message: 'Superseded by new review run.',
                  });
                  console.log(`Dismissed review ${review.id}`);
                } catch (err) {
                  console.log(`Could not dismiss review ${review.id}: ${err.message}`);
                }
              }
            }

            // Pass unresolved context to Claude for incremental review
            const output = {
              unresolved: unresolved.map(c => ({
                id: c.id,
                path: c.path,
                line: c.original_line || c.line,
                body: c.body?.replace(marker, '').trim().slice(0, 300)
              })),
              resolved_count: resolved.length,
              total_prior: claudeInline.length
            };

            core.setOutput('context', JSON.stringify(output));

      # ── Step 2: Claude analyzes and returns structured JSON ────────────
      - name: Analyze PR with Claude
        id: claude-analyze
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: 'false'
          claude_args: |
            --model claude-sonnet-4-6
            --json-schema '{"type":"object","properties":{"verdict":{"type":"string","enum":["approve","request_changes","comment"]},"summary":{"type":"string"},"good_parts":{"type":"string"},"findings":{"type":"array","items":{"type":"object","properties":{"severity":{"type":"string","enum":["critical","warning","suggestion","nit"]},"path":{"type":"string"},"start_line":{"type":"integer"},"end_line":{"type":"integer"},"title":{"type":"string"},"body":{"type":"string"},"suggestion":{"type":"string"}},"required":["severity","path","start_line","end_line","title","body"]}}},"required":["verdict","summary","findings"]}'
          prompt: |
            You are a code reviewer. Analyze the PR diff and return structured JSON.

            Run `git diff origin/main...HEAD` to see what changed, then read the changed files for full context.
            Also read the project's CLAUDE.md for review rules.

            ## Prior unresolved findings (avoid duplicates)

            ```json
            ${{ steps.cleanup.outputs.context }}
            ```

            ## Rules

            1. Only review code changed in this PR. Do not flag pre-existing issues.
            2. Do NOT duplicate findings that match `unresolved` above (same file + nearby line + same issue).
            3. Migration "immutable" rule: only flag edited migrations as critical if they existed on `main` before this PR.
            4. Linter rules override CLAUDE.md conventions.
            5. Focus on real bugs, security issues, data loss risks, and clear CLAUDE.md violations. Skip style nits that linters catch.

            ## Output format

            Return JSON matching the schema. For each finding:
            - `path`: file path relative to repo root
            - `start_line` / `end_line`: line range in the NEW file (the PR version, not the base). Use the same line for single-line issues.
            - `title`: short description (under 80 chars)
            - `body`: detailed explanation with why it matters
            - `suggestion`: (optional) the corrected code that should replace the lines from start_line to end_line. Only include if you have a concrete, complete fix.
            - `severity`: critical / warning / suggestion / nit

            For `verdict`: use "approve" if no critical/warning findings, "request_changes" if any critical, "comment" otherwise.
            For `summary`: 1-3 sentences about the overall PR quality.
            For `good_parts`: what the PR does well (1-2 sentences).

      # ── Step 3: Post review + single summary comment ──────────────────
      - name: Post review
        if: steps.claude-analyze.outputs.structured_output != ''
        uses: actions/github-script@v7
        env:
          REVIEW_OUTPUT: ${{ steps.claude-analyze.outputs.structured_output }}
          CLEANUP_CONTEXT: ${{ steps.cleanup.outputs.context }}
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;
            const marker = '<!-- claude-review -->';
            const summaryMarker = '<!-- claude-review-summary -->';

            let review;
            try {
              review = JSON.parse(process.env.REVIEW_OUTPUT);
            } catch (err) {
              console.log('Failed to parse Claude output:', err.message);
              return;
            }

            const { verdict, summary, good_parts, findings } = review;

            const severityEmoji = {
              critical: '🔴 Critical',
              warning: '🟡 Warning',
              suggestion: '🔵 Suggestion',
              nit: '⚪ Nit'
            };

            // ── Build inline comments ────────────────────────────────
            const comments = [];
            for (const f of findings) {
              let body = `${marker}\n\n**${severityEmoji[f.severity]}** -- ${f.title}\n\n${f.body}`;

              if (f.suggestion) {
                body += `\n\n\`\`\`suggestion\n${f.suggestion}\n\`\`\``;
              }

              if (f.severity === 'critical' || f.severity === 'warning') {
                body += `\n\nReply **@claude fix this** to auto-fix.`;
              }

              const comment = { path: f.path, body, line: f.end_line };
              if (f.start_line !== f.end_line) comment.start_line = f.start_line;
              comments.push(comment);
            }

            // ── Submit PR review (inline comments attach here) ───────
            const event = verdict === 'approve' ? 'APPROVE'
              : verdict === 'request_changes' ? 'REQUEST_CHANGES'
              : 'COMMENT';

            const reviewBody = findings.length === 0
              ? `${marker}\n\n✅ No issues found.`
              : `${marker}\n\nPosted ${findings.length} inline comments.`;

            try {
              await github.rest.pulls.createReview({
                owner, repo, pull_number: pr, commit_id: sha, event,
                body: reviewBody,
                comments,
              });
              console.log(`Posted review (${event}) with ${comments.length} inline comments`);
            } catch (err) {
              console.log('Failed to post review:', err.message);
              // Fallback: post comments individually
              for (const c of comments) {
                try {
                  await github.rest.pulls.createReviewComment({
                    owner, repo, pull_number: pr, commit_id: sha,
                    ...c, side: 'RIGHT',
                  });
                } catch (e) {
                  console.log(`Failed to post comment on ${c.path}:${c.line}:`, e.message);
                }
              }
            }

            // ── Build compact summary (single sticky comment) ────────
            const counts = { critical: 0, warning: 0, suggestion: 0, nit: 0 };
            for (const f of findings) counts[f.severity]++;

            const prior = JSON.parse(process.env.CLEANUP_CONTEXT);
            const isReReview = prior.total_prior > 0;

            const verdictText = verdict === 'approve' ? '✅ Approved'
              : verdict === 'request_changes' ? '🚫 Changes Requested'
              : '💬 Reviewed';

            let body = `${summaryMarker}\n\n`;
            body += `## ${verdictText}\n\n`;
            body += `${summary}\n\n`;
            body += `**${counts.critical}** critical | **${counts.warning}** warnings | **${counts.suggestion}** suggestions | **${counts.nit}** nits`;

            if (isReReview) {
              body += ` | **${prior.resolved_count}** previously resolved`;
            }
            body += `\n\n`;

            if (counts.critical > 0 || counts.warning > 0) {
              body += `Reply **@claude fix all review findings** to auto-fix.\n\n`;
            }

            // Findings table -- always collapsed
            if (findings.length > 0) {
              body += `<details>\n<summary>Findings (${findings.length})</summary>\n\n`;
              body += `| # | Sev | File | Line | Issue |\n`;
              body += `|---|-----|------|------|-------|\n`;
              findings.forEach((f, i) => {
                const sev = f.severity === 'critical' ? '🔴' : f.severity === 'warning' ? '🟡' : f.severity === 'suggestion' ? '🔵' : '⚪';
                body += `| ${i + 1} | ${sev} | \`${f.path.split('/').pop()}\` | ${f.start_line} | ${f.title} |\n`;
              });
              body += `\n</details>\n\n`;
            }

            if (good_parts) {
              body += `<details>\n<summary>What looks good</summary>\n\n${good_parts}\n\n</details>\n`;
            }

            // Find and update existing summary, or create new
            const issueComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr, per_page: 100 }
            );
            const existing = issueComments.find(c => c.body?.includes(summaryMarker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
              console.log('Updated existing summary comment');
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr, body
              });
              console.log('Created new summary comment');
            }

            // ── Clean up stale bot comments (progress, description) ──
            const botMarkers = ['<!-- claude-progress', '<!-- claude-code-action'];
            for (const c of issueComments) {
              if (c.user?.type !== 'Bot') continue;
              if (c.body?.includes(summaryMarker)) continue; // keep our summary
              const isStale = botMarkers.some(m => c.body?.includes(m))
                || (c.body?.includes('Claude') && c.body?.length < 200 && !c.body?.includes(summaryMarker));
              if (isStale) {
                try {
                  await github.graphql(`
                    mutation($id: ID!) {
                      minimizeComment(input: {
                        subjectId: $id,
                        classifier: OUTDATED
                      }) { minimizedComment { isMinimized } }
                    }
                  `, { id: c.node_id });
                  console.log(`Minimized stale bot comment ${c.id}`);
                } catch (err) {
                  console.log(`Could not minimize ${c.id}: ${err.message}`);
                }
              }
            }
