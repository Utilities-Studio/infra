name: Deploy Cloudflare Pages

on:
  workflow_call:
    inputs:
      project_name:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      working_directory:
        description: 'Working directory for the project'
        required: false
        type: string
        default: '.'
      build_output_directory:
        description: 'Directory containing build output'
        required: false
        type: string
        default: 'dist'
      pre_deploy_commands:
        description: 'Commands to run before build'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: pages-${{ inputs.project_name }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'production' }}-${{ github.repository }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}

    environment:
      name: ${{ github.event_name == 'pull_request' && format('preview-pr-{0}', github.event.pull_request.number) || 'production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ github.event_name != 'pull_request' && secrets.DOTENV_PRIVATE_KEY_PRODUCTION || '' }}
      IS_PREVIEW: ${{ github.event_name == 'pull_request' }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Comment -- deploy started
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-pages-deploy -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              marker,
              '### :cloud: Cloudflare Pages Deploy',
              '',
              '| Status | Commit | Environment |',
              '|--------|--------|-------------|',
              `| :hourglass_flowing_sand: Building... | \`${sha}\` | preview |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            const params = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: pr });
            }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run pre-deploy commands
        if: inputs.pre_deploy_commands != ''
        run: ${{ inputs.pre_deploy_commands }}

      - name: Build
        run: bun run build -- --mode ${{ env.IS_PREVIEW == 'true' && 'development' || 'production' }}
        env:
          CLOUDFLARE_ENV: ${{ env.IS_PREVIEW == 'true' && 'development' || 'production' }}

      - name: Comment -- deploying
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-pages-deploy -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              marker,
              '### :cloud: Cloudflare Pages Deploy',
              '',
              '| Status | Commit | Environment |',
              '|--------|--------|-------------|',
              `| :rocket: Deploying... | \`${sha}\` | preview |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy ${{ inputs.build_output_directory }} --project-name=${{ inputs.project_name }} ${{ env.IS_PREVIEW == 'true' && format('--branch=pr-{0}', github.event.pull_request.number) || '--branch=main' }}
          workingDirectory: ${{ inputs.working_directory }}
          packageManager: bun
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment -- deploy succeeded
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-pages-deploy -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const aliasUrl = '${{ steps.deploy.outputs.pages-deployment-alias-url }}';

            let links = `[Preview](${url})`;
            if (aliasUrl && aliasUrl !== url) links += ` | [Alias](${aliasUrl})`;

            const body = [
              marker,
              '### :cloud: Cloudflare Pages Deploy',
              '',
              '| Status | Commit | Environment | Links |',
              '|--------|--------|-------------|-------|',
              `| :white_check_mark: Live | \`${sha}\` | preview | ${links} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }

      - name: Comment -- deploy failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-pages-deploy -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            const body = [
              marker,
              '### :cloud: Cloudflare Pages Deploy',
              '',
              '| Status | Commit | Environment |',
              '|--------|--------|-------------|',
              `| :x: Failed | \`${sha}\` | preview |`,
              '',
              `[View logs](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }
