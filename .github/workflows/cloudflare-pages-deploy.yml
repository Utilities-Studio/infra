name: Deploy Cloudflare Pages

on:
  workflow_call:
    inputs:
      project_name:
        description: 'Cloudflare Pages project name'
        required: true
        type: string
      working_directory:
        description: 'Working directory for the project'
        required: false
        type: string
        default: '.'
      build_output_directory:
        description: 'Directory containing build output'
        required: false
        type: string
        default: 'dist'
      pre_deploy_commands:
        description: 'Commands to run before build'
        required: false
        type: string
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      DOTENV_PRIVATE_KEY_DEVELOPMENT:
        required: false
      DOTENV_PRIVATE_KEY_PRODUCTION:
        required: false

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: cf-pages-${{ inputs.project_name }}-${{ github.event.pull_request.number || 'production' }}-${{ github.repository }}
      cancel-in-progress: ${{ github.event.pull_request.number != '' }}

    environment:
      name: ${{ github.event.pull_request.number == '' && 'production' || '' }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT }}
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ github.event.pull_request.number == '' && secrets.DOTENV_PRIVATE_KEY_PRODUCTION || '' }}
      IS_PREVIEW: ${{ github.event.pull_request.number != '' }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Comment -- deploy started
        if: env.IS_PREVIEW == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cf-pages-preview -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              `<h3>Deploying <code>${branch}</code> with ☁️ Cloudflare Pages</h3>`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Latest commit** | \`${sha}\` |`,
              `| **Status** | 🔨 Building... |`,
              `| **Preview URL** | _Pending_ |`,
              `| **Logs** | [View workflow](${runUrl}) |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            const params = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: pr });
            }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run pre-deploy commands
        if: inputs.pre_deploy_commands != ''
        run: ${{ inputs.pre_deploy_commands }}

      - name: Build
        run: bun run build -- --mode ${{ env.IS_PREVIEW == 'true' && 'development' || 'production' }}
        env:
          CLOUDFLARE_ENV: ${{ env.IS_PREVIEW == 'true' && 'development' || 'production' }}

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy ${{ inputs.build_output_directory }} --project-name=${{ inputs.project_name }} ${{ env.IS_PREVIEW == 'true' && format('--branch=pr-{0}', github.event.pull_request.number) || '--branch=main' }}
          workingDirectory: ${{ inputs.working_directory }}
          packageManager: bun
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment -- deploy succeeded
        if: env.IS_PREVIEW == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cf-pages-preview -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const aliasUrl = '${{ steps.deploy.outputs.pages-deployment-alias-url }}';

            const links = [url && `[Preview](${url})`, aliasUrl && aliasUrl !== url && `[Branch alias](${aliasUrl})`].filter(Boolean).join(' · ');

            const body = [
              marker,
              `<h3>Deployed <code>${branch}</code> with ☁️ Cloudflare Pages</h3>`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Latest commit** | \`${sha}\` |`,
              `| **Status** | ✅ Deploy successful |`,
              links ? `| **Preview URL** | ${links} |` : null,
              `| **Logs** | [View workflow](${runUrl}) |`,
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }

      - name: Comment -- deploy failed
        if: env.IS_PREVIEW == 'true' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cf-pages-preview -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              `<h3>Failed to deploy <code>${branch}</code> with ☁️ Cloudflare Pages</h3>`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Latest commit** | \`${sha}\` |`,
              `| **Status** | ❌ Deploy failed |`,
              `| **Logs** | [View workflow](${runUrl}) |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }
