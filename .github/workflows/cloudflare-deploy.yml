name: Deploy Cloudflare Workers

on:
  workflow_call:
    inputs:
      environment:
        description: 'Wrangler environment (omit for single-env projects)'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Working directory for the project'
        required: false
        type: string
        default: '.'
      pre_deploy_commands:
        description: 'Commands to run before build'
        required: false
        type: string
      skip_build:
        description: 'Skip build step'
        required: false
        type: boolean
        default: false
      skip_sync_env:
        description: 'Skip sync-env step'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: cf-workers-${{ github.event.pull_request.number || inputs.environment || 'production' }}-${{ github.repository }}
      cancel-in-progress: ${{ github.event.pull_request.number != '' }}

    environment: ${{ github.event.pull_request.number == '' && (inputs.environment || 'production') || '' }}

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ inputs.environment == 'development' && secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT || '' }}
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ inputs.environment == 'production' && secrets.DOTENV_PRIVATE_KEY_PRODUCTION || '' }}
      IS_PREVIEW: ${{ github.event.pull_request.number != '' }}
      ENV_FLAG: ${{ inputs.environment != '' && format('--env {0}', inputs.environment) || '' }}
      PREVIEW_ENV_FLAG: ${{ inputs.environment != '' && '--env development' || '' }}
      MODE_FLAG: ${{ inputs.environment != '' && format('-- --mode {0}', inputs.environment) || '' }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Comment -- deploy started
        if: env.IS_PREVIEW == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-workers-deploy -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              marker,
              '### :gear: Cloudflare Workers Preview',
              '',
              '| Status | Commit |',
              '|--------|--------|',
              `| :hourglass_flowing_sand: Building... | \`${sha}\` |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            const params = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: pr });
            }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push secrets to Cloudflare
        if: ${{ !inputs.skip_sync_env }}
        run: bunx @utilities-studio/sync-env@latest cloudflare ${{ env.ENV_FLAG }}

      - name: Run pre-deploy commands
        if: inputs.pre_deploy_commands != ''
        run: ${{ inputs.pre_deploy_commands }}

      - name: Build
        if: ${{ !inputs.skip_build }}
        run: bun run build ${{ env.MODE_FLAG }}
        env:
          CLOUDFLARE_ENV: ${{ inputs.environment }}

      - name: Deploy
        if: env.IS_PREVIEW != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy ${{ env.ENV_FLAG }}
          workingDirectory: ${{ inputs.working_directory }}
          packageManager: bun

      - name: Upload preview version
        if: env.IS_PREVIEW == 'true'
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload ${{ env.PREVIEW_ENV_FLAG }} --preview-alias pr-${{ github.event.pull_request.number }}
          workingDirectory: ${{ inputs.working_directory }}
          packageManager: bun

      - name: Comment -- preview live
        if: env.IS_PREVIEW == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-workers-deploy -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const output = `${{ steps.preview.outputs.command-output }}`;

            const urlMatch = output.match(/(https:\/\/[^\s]+\.workers\.dev)/);
            const previewUrl = urlMatch ? urlMatch[1] : null;
            const links = previewUrl ? `[Preview](${previewUrl})` : 'uploaded';

            const body = [
              marker,
              '### :gear: Cloudflare Workers Preview',
              '',
              '| Status | Commit | Links |',
              '|--------|--------|-------|',
              `| :white_check_mark: Live | \`${sha}\` | ${links} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }

      - name: Comment -- deploy failed
        if: env.IS_PREVIEW == 'true' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cloudflare-workers-deploy -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const runUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';

            const body = [
              marker,
              '### :gear: Cloudflare Workers Preview',
              '',
              '| Status | Commit |',
              '|--------|--------|',
              `| :x: Failed | \`${sha}\` |`,
              '',
              `[View logs](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }
