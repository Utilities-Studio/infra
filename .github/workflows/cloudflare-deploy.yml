name: Deploy Cloudflare Workers

on:
  workflow_call:
    inputs:
      environment:
        description: 'Wrangler environment (omit for single-env projects)'
        required: false
        type: string
        default: ''
      working_directory:
        description: 'Working directory for the project'
        required: false
        type: string
        default: '.'
      pre_deploy_commands:
        description: 'Commands to run before build'
        required: false
        type: string
      skip_build:
        description: 'Skip build step'
        required: false
        type: boolean
        default: false
      skip_sync_env:
        description: 'Skip sync-env step'
        required: false
        type: boolean
        default: false
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      DOTENV_PRIVATE_KEY_DEVELOPMENT:
        required: false
      DOTENV_PRIVATE_KEY_PRODUCTION:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: cf-workers-${{ github.event.pull_request.number || inputs.environment || 'production' }}-${{ github.repository }}
      cancel-in-progress: ${{ github.event.pull_request.number != '' }}

    environment: ${{ github.event.pull_request.number == '' && (inputs.environment || 'production') || '' }}

    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ inputs.environment == 'development' && secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT || '' }}
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ inputs.environment == 'production' && secrets.DOTENV_PRIVATE_KEY_PRODUCTION || '' }}
      IS_PREVIEW: ${{ github.event.pull_request.number != '' }}
      ENV_FLAG: ${{ inputs.environment != '' && format('--env {0}', inputs.environment) || '' }}
      PREVIEW_ENV_FLAG: ${{ inputs.environment != '' && '--env development' || '' }}
      MODE_FLAG: ${{ inputs.environment != '' && format('-- --mode {0}', inputs.environment) || '' }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Comment -- deploy started
        if: env.IS_PREVIEW == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cf-workers-preview -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const repo = context.payload.repository.name;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              `### Deploying \`${branch}\` with ⚡ Cloudflare Workers`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Latest commit** | \`${sha}\` |`,
              `| **Status** | 🔨 Building... |`,
              `| **Preview URL** | _Pending_ |`,
              `| **Logs** | [View workflow](${runUrl}) |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));

            const params = { owner: context.repo.owner, repo: context.repo.repo, body };
            if (existing) {
              await github.rest.issues.updateComment({ ...params, comment_id: existing.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: pr });
            }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push secrets to Cloudflare
        if: ${{ !inputs.skip_sync_env }}
        run: bunx @utilities-studio/sync-env@latest cloudflare ${{ env.ENV_FLAG }}

      - name: Run pre-deploy commands
        if: inputs.pre_deploy_commands != ''
        run: ${{ inputs.pre_deploy_commands }}

      - name: Build
        if: ${{ !inputs.skip_build }}
        run: bun run build ${{ env.MODE_FLAG }}
        env:
          CLOUDFLARE_ENV: ${{ inputs.environment }}

      - name: Deploy
        if: env.IS_PREVIEW != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy ${{ env.ENV_FLAG }}
          workingDirectory: ${{ inputs.working_directory }}
          packageManager: bun

      - name: Upload preview version
        if: env.IS_PREVIEW == 'true'
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: versions upload ${{ env.PREVIEW_ENV_FLAG }} --preview-alias pr-${{ github.event.pull_request.number }}
          workingDirectory: ${{ inputs.working_directory }}
          packageManager: bun

      - name: Extract preview URL
        if: env.IS_PREVIEW == 'true' && success()
        id: preview-url
        run: |
          ALIAS_URL=$(echo "${{ steps.preview.outputs.command-output }}" | grep -oP 'Version Preview Alias URL: \K\S+' || true)
          DEPLOY_URL="${{ steps.preview.outputs.deployment-url }}"
          URL="${ALIAS_URL:-$DEPLOY_URL}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Comment -- preview live
        if: env.IS_PREVIEW == 'true' && success()
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview-url.outputs.url }}
        with:
          script: |
            const marker = '<!-- cf-workers-preview -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const previewUrl = process.env.PREVIEW_URL || null;

            const body = [
              marker,
              `### Deployed \`${branch}\` with ⚡ Cloudflare Workers`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Latest commit** | \`${sha}\` |`,
              `| **Status** | ✅ Deploy successful |`,
              previewUrl ? `| **Preview URL** | [${previewUrl}](${previewUrl}) |` : null,
              `| **Logs** | [View workflow](${runUrl}) |`,
            ].filter(Boolean).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }

      - name: Comment -- deploy failed
        if: env.IS_PREVIEW == 'true' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- cf-workers-preview -->';
            const pr = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              `### Failed to deploy \`${branch}\` with ⚡ Cloudflare Workers`,
              '',
              `| | |`,
              `|---|---|`,
              `| **Latest commit** | \`${sha}\` |`,
              `| **Status** | ❌ Deploy failed |`,
              `| **Logs** | [View workflow](${runUrl}) |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            }
