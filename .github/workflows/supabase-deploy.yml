name: Deploy Supabase

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: string
      deploy_migrations:
        description: 'Deploy database migrations'
        required: false
        type: boolean
        default: true
      deploy_functions:
        description: 'Deploy edge functions'
        required: false
        type: boolean
        default: true
      working_directory:
        description: 'Working directory for the project'
        required: false
        type: string
        default: '.'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: supabase-deploy-${{ inputs.environment }}-${{ github.repository }}
      cancel-in-progress: false

    environment: ${{ inputs.environment }}

    env:
      DOTENV_PRIVATE_KEY_DEVELOPMENT: ${{ inputs.environment == 'development' && secrets.DOTENV_PRIVATE_KEY_DEVELOPMENT || '' }}
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ inputs.environment == 'production' && secrets.DOTENV_PRIVATE_KEY_PRODUCTION || '' }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load env vars
        run: |
          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            key="${line%%=*}"
            value="${line#*=}"
            value="${value%\"}"
            value="${value#\"}"
            [[ "$key" =~ ^(DOTENV_|NODE_OPTIONS|VITE_) ]] && continue
            echo "::add-mask::$value"
            echo "$key=$value" >> "$GITHUB_ENV"
          done < .env.${{ inputs.environment }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ env.SUPABASE_PROJECT_ID }}

      - name: Sync edge function secrets
        run: bunx @utilities-studio/sync-env@latest supabase --env ${{ inputs.environment }}

      - name: Push project config
        run: supabase config push --yes

      - name: Deploy database migrations
        if: inputs.deploy_migrations
        run: supabase db push --include-all --yes

      - name: Deploy edge functions
        if: inputs.deploy_functions
        run: supabase functions deploy

      - name: Tag deployment
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="supabase-deploy-${DEPLOY_ENV}-$(date -u +%Y%m%d-%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
